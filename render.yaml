# Déploiement automatique sur Render — Voisins Collectif et en Colère
# Render lit ce fichier et configure le service web tout seul.
services:
  - type: web
    name: voisins-aragon
    runtime: node
    plan: free
    # --include=dev : Prisma CLI et tsx sont des devDependencies nécessaires au build.
    # Migrations Prisma (remplace `db push`) : historique versionné + rollback.
    # `migrate resolve --applied 0_init` : baseline. La base Neon existe déjà
    #   (créée par les anciens `db push`) ; on marque la migration initiale comme
    #   DÉJÀ appliquée sans la ré-exécuter (aucune perte de données). Idempotent :
    #   `|| true` avale l'erreur "déjà appliquée" aux déploiements suivants.
    # `migrate deploy` applique ensuite uniquement les NOUVELLES migrations.
    # NB : sur une base VIERGE, retirer la ligne `resolve` (les tables seraient
    #   sinon marquées appliquées sans être créées).
    buildCommand: >-
      npm install --include=dev &&
      npx prisma generate &&
      (npx prisma migrate resolve --applied 0_init || true) &&
      npx prisma migrate deploy &&
      npm run db:seed &&
      npm run build
    startCommand: npm start
    healthCheckPath: /healthz
    envVars:
      - key: NODE_ENV
        value: production
      - key: TZ
        value: Europe/Paris
      # Base Postgres durable (Neon) — valeur renseignée dans le dashboard Render.
      - key: DATABASE_URL
        sync: false
      # Stockage durable des fichiers (Cloudinary) — valeurs dans le dashboard.
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      # Notifications push (Web Push / VAPID) — valeurs dans le dashboard.
      - key: VAPID_PUBLIC_KEY
        sync: false
      - key: VAPID_PRIVATE_KEY
        sync: false
      - key: VAPID_SUBJECT
        value: mailto:sdsb.2023@gmail.com
      # Secret de session généré automatiquement par Render.
      - key: SESSION_SECRET
        generateValue: true
      # Secret partagé pour la purge de rétention RGPD (route /api/cron/purge),
      # déclenchée par GitHub Actions. MÊME valeur ici et dans le secret de
      # dépôt GitHub `CRON_SECRET`.
      - key: CRON_SECRET
        sync: false
      # URL publique de l'app (à renseigner après le 1er déploiement).
      - key: APP_URL
        sync: false
      # E-mails (facultatif) — à coller dans le dashboard Render si besoin.
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        sync: false
