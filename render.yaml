# Déploiement automatique sur Render — Voisins Collectif et en Colère
# Render lit ce fichier et configure le service web tout seul.
services:
  - type: web
    name: voisins-aragon
    runtime: node
    plan: free
    # --include=dev : Prisma CLI et tsx sont des devDependencies nécessaires au build.
    # `prisma db push` crée le schéma directement dans Postgres (Neon), sans
    # fichiers de migration ; le seed (idempotent) garantit les comptes admin.
    buildCommand: >-
      npm install --include=dev &&
      npx prisma generate &&
      npx prisma db push &&
      npm run db:seed &&
      npm run build
    startCommand: npm start
    healthCheckPath: /healthz
    envVars:
      - key: NODE_ENV
        value: production
      - key: TZ
        value: Europe/Paris
      # Base Postgres durable (Neon) — valeur renseignée dans le dashboard Render.
      - key: DATABASE_URL
        sync: false
      # Stockage durable des fichiers (Cloudinary) — valeurs dans le dashboard.
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      # Secret de session généré automatiquement par Render.
      - key: SESSION_SECRET
        generateValue: true
      # URL publique de l'app (à renseigner après le 1er déploiement).
      - key: APP_URL
        sync: false
      # E-mails (facultatif) — à coller dans le dashboard Render si besoin.
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        sync: false
