name: Purge de retention (RGPD)

on:
  schedule:
    - cron: "17 3 * * 0"
  workflow_dispatch: {}

jobs:
  purge:
    runs-on: ubuntu-latest
    steps:
      - name: Appeler la purge
        run: |
          URL="${{ vars.PING_URL }}"
          SECRET="${{ secrets.CRON_SECRET }}"
          if [ -z "$URL" ]; then echo "PING_URL manquant"; exit 0; fi
          if [ -z "$SECRET" ]; then echo "CRON_SECRET manquant"; exit 0; fi
          curl -fsS -X POST --max-time 120 -H "Authorization: Bearer $SECRET" "$URL/api/cron/purge" && echo " - OK"
