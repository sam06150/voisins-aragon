name: Keep Render Awake

on:
  schedule:
    - cron: "*/13 * * * *"
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping /healthz
        run: |
          URL="${{ vars.PING_URL }}"
          if [ -z "$URL" ]; then
            echo "PING_URL non defini."
            exit 0
          fi
          curl -fsS --max-time 30 "$URL/healthz" && echo " - OK"
